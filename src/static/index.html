<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGUS AI | Millî Hava Savunma Sistemi</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div id="boot-overlay" class="boot-level"></div>
    <div id="canvas-container"></div>
    <div class="crt-overlay"></div>
    <div class="emp-whiteout"></div>

    <!-- HIGH-LEVEL HUD -->
    <header id="comp-hud" class="comp-hud hidden">
        <div class="hud-box">
            <span class="hud-label">SİSTEM AŞAMASI</span>
            <span id="hud-stage" class="hud-value">-</span>
        </div>
        <div class="hud-box">
            <span class="hud-label">TEKNOFEST PUANI</span>
            <span id="hud-score" class="hud-value gold-text">0</span>
        </div>
        <div class="hud-box">
            <span class="hud-label">OPERASYONEL MOD</span>
            <span id="hud-mode" class="hud-value">ANALİZ</span>
        </div>
        <div class="hud-box">
            <span class="hud-label">AĞ SENKRONİZASYONU</span>
            <span id="hud-network" class="hud-value">GÖK-VATAN: AKTİF</span>
        </div>
    </header>

    <main class="ui-layer">
        <!-- LEFT SIDEBAR: INTEL & METRICS -->
        <aside class="sidebar">
            <div class="logo-box">
                <h1>ARGUS</h1>
                <div class="sub-logo">
                    <span>MİLLÎ HAVA SAVUNMA KOMUTASI</span>
                    <div class="version">v2026.1-TACTICAL</div>
                </div>
            </div>

            <section class="system-grid">
                <div class="system-item">
                    <div class="label">
                        <span>BATARYA ENERJİSİ</span>
                        <span id="battery-percent">100%</span>
                    </div>
                    <div class="bar-container">
                        <div id="battery-bar" class="bar green" style="width: 100%"></div>
                    </div>
                </div>
                <div class="system-item">
                    <div class="label">
                        <span>İŞLEMCİ YÜKÜ</span>
                        <span id="cpu-percent">12%</span>
                    </div>
                    <div class="bar-container">
                        <div id="cpu-bar" class="bar cyan" style="width: 12%"></div>
                    </div>
                </div>
            </section>

            <section class="metrics-panel">
                <div class="panel-header">
                    <span class="led green"></span>
                    <h2>TEHDİT TAKİP MATRİSİ</h2>
                </div>
                <div id="target-list" class="target-list">
                    <!-- Dynamic Entry -->
                </div>
            </section>

            <section class="telemetry-chart-box">
                <canvas id="telemetryChart"></canvas>
            </section>

            <footer class="footer-info">
                <div class="connection-status">
                    DURUM: <span id="ws-status" class="status-offline">BAĞLANILIYOR...</span>
                </div>
            </footer>
        </aside>

        <!-- CENTER/RIGHT AREA: HUD & C2 CONSOLE -->
        <div id="tooltips-container"></div>

        <section class="c2-controls">
            <div class="control-header">
                <span>C2 HAREKAT KONSOLU</span>
                <span id="hud-directive" class="gold-text">BEKLEMEDE...</span>
            </div>

            <div class="control-row camera-modes">
                <button id="btn-cam-tactical" class="btn active">TAKTIK</button>
                <button id="btn-cam-top" class="btn">TEPE</button>
                <button id="btn-cam-base" class="btn">ÜS</button>
                <button id="btn-cam-follow" class="btn">TAKİP</button>
            </div>

            <div class="control-row">
                <button id="btn-stage-1" class="btn">AŞAMA-1</button>
                <button id="btn-stage-2" class="btn">AŞAMA-2</button>
                <button id="btn-stage-3" class="btn">AŞAMA-3</button>
            </div>

            <div class="control-row secondary">
                <select id="target-selector" class="dropdown-select">
                    <option value="">-- HEDEF KİLİTLE --</option>
                </select>
                <button id="btn-manual-fire" class="btn warning">ANGARYA</button>
            </div>

            <div class="control-row tertiary">
                <button id="btn-toggle-auto" class="btn">OTONOM MOD: KAPALI</button>
                <button id="btn-toggle-emission" class="btn active">RADAR YAYINI: AKTİF</button>
                <button id="btn-toggle-weather" class="btn info">METEOROLOJİ</button>
            </div>

            <div class="control-row mission-panel">
                <select id="mission-selector" class="dropdown-select mission">
                    <option value="">-- OPERASYONEL GÖREV SEÇ --</option>
                    <option value="SWARM_ATTACK">Sürü İHA Taarruzu</option>
                    <option value="BALLISTIC_SALVO">Balistik Füze Yaylımı</option>
                    <option value="HYPERSONIC_THREAT">Hipersonik Önleme</option>
                    <option value="EW_OPERATIONS">Elektronik Harp (EW)</option>
                </select>
                <button id="btn-start-mission" class="btn active">GÖREVİ BAŞLAT</button>
            </div>

            <div class="control-row actions">
                <button id="btn-trigger-emp" class="btn danger-alt">EMP BLAST</button>
                <button id="btn-force-swarm" class="btn">SWARM</button>
                <button id="btn-force-hypersonic" class="btn">HYPERSONIC</button>
                <button id="btn-estop" class="btn estop">E-STOP</button>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>

</html>
