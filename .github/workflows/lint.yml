name: "Military Grade CI/CD Pipeline"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  static_analysis:
    name: "Tactical Code Analysis & Linting"
    runs-on: ubuntu-latest

    steps:
    - name: Protocol Initiation (Checkout Repository)
      uses: actions/checkout@v4

    - name: Sensor Calibration (Set up Python 3.10)
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Ammunition Load (Install dependencies)
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Radar Scan (Lint with flake8)
      run: |
        # Warning: Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # The exit-zero flag treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Combat Simulation (Run Pytest)
      run: |
        pytest tests/
