<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GökKalkan AI | 3D Tactical Command Center</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for Cyberpunk/Modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <!-- Three.js and OrbitControls via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- Chart.js for Telemetry -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- CRT Overlay Effect -->
    <div class="crt-overlay"></div>

    <div class="ui-layer">
        <!-- Sidebar for Telemetry -->
        <aside class="sidebar">
            <div class="logo-box">
                <h1>GÖKKALKAN</h1>
                <p>V5.0 3D WEBGL</p>
                <div class="status-indicator">
                    <div class="led green"></div>
                    <span>SYSTEM ONLINE</span>
                </div>
            </div>

            <div class="metrics-panel">
                <h2>TARGET INTEL</h2>
                <div id="target-list" class="target-list">
                    <!-- Targets injected via JS -->
                </div>
            </div>

            <div class="footer-info">
                <p>C2 NODE: SECTOR 7 (3D VIEW)</p>
                <p>WS CONNECTION: <span id="ws-status" style="color:red">DISCONNECTED</span></p>
                <p class="hint">Use Mouse: Click & Drag to Rotate, Scroll to Zoom</p>
            </div>

            <div class="chart-container">
                <canvas id="telemetryChart"></canvas>
            </div>
        </aside>

        <!-- Dynamic Target Tooltips Container (2D Overlays on 3D Space) -->
        <div id="tooltips-container"></div>
    </div>

    <script src="app.js"></script>
</body>

</html>
